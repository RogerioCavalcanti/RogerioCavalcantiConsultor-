<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <style>
    * {
      box-sizing: border-box;
      max-width: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1608, #050505 65%);
      color: #fff;
    }

    body {
      padding: 12px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      width: calc(100vw - 24px);
      max-width: 560px;
      margin: 12px auto;
      padding: 20px;
      background: #111;
      border-radius: 22px;
      border: 1px solid #333;
      box-shadow: 0 0 35px rgba(212,175,55,0.35);
    }

    .logo {
      width: 115px;
      height: 115px;
      object-fit: cover;
      object-position: center 42%;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: block;
      margin: 0 auto 14px;
      box-shadow: 0 0 28px rgba(212,175,55,0.8);
    }

    h1 {
      text-align: center;
      font-size: 24px;
      line-height: 1.2;
      margin: 8px 0 6px;
    }

    .subtitulo {
      text-align: center;
      color: #d4af37;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .aviso {
      background: rgba(212,175,55,0.18);
      border-left: 5px solid #d4af37;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    input {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      margin-bottom: 12px;
      border-radius: 12px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      font-size: 17px;
      display: block;
    }

    input::placeholder {
      color: #aaa;
    }

    input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 8px rgba(212,175,55,0.35);
    }

    label {
      display: block;
      color: #d4af37;
      font-size: 16px;
      font-weight: bold;
      margin: 12px 0 7px;
    }

    canvas {
      width: 100%;
      height: 180px;
      background: white;
      border-radius: 14px;
      border: 2px dashed #d4af37;
      display: block;
      touch-action: none;
    }

    .botoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      width: 100%;
      height: 56px;
      border-radius: 14px;
      border: none;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-limpar {
      background: #303030;
      color: white;
      border: 1px solid #555;
    }

    .btn-enviar {
      background: linear-gradient(135deg, #d4af37, #ffe17a);
      color: #111;
    }

    #status {
      text-align: center;
      color: #d4af37;
      font-weight: bold;
      font-size: 15px;
      margin-top: 16px;
      min-height: 24px;
    }

    .rodape {
      text-align: center;
      color: #aaa;
      font-size: 12px;
      margin-top: 16px;
    }
/* AJUSTE FINAL */

body{
  padding:4px !important;
  display:flex !important;
  justify-content:center !important;
  align-items:flex-start !important;
}

.card{
  width:calc(100vw - 12px) !important;
  max-width:620px !important;
  min-height:auto !important;
  margin:4px auto !important;
  padding:22px !important;
  border-radius:22px !important;
}

.logo{
  width:135px !important;
  height:135px !important;
}

h1{
  font-size:30px !important;
}

.subtitulo{
  font-size:16px !important;
}

.aviso{
  font-size:17px !important;
  padding:16px !important;
}

input{
  height:64px !important;
  font-size:20px !important;
}

label{
  font-size:18px !important;
}

canvas{
  height:210px !important;
}

button{
  height:64px !important;
  font-size:19px !important;
}

.rodape{
  font-size:14px !important;
  margin-bottom:0 !important;
}

#status{
  margin-bottom:0 !important;
}
  </style>
</head>

<body>
  <div class="card">

    <img src="https://drive.google.com/thumbnail?id=1Gdx2_FyOc3-JFW_0MsWk7NNZnS0uKWQI&sz=w400" class="logo">

    <h1>CONFIRMAÇÃO DE ATENDIMENTO</h1>

    <div class="subtitulo">
      Segurança • Validação • Localização
    </div>

    <div class="aviso">
      Ao continuar, você autoriza o envio do seu CPF, localização atual,
      foto/selfie e assinatura para confirmação de atendimento ou entrega.
    </div>

    <input id="nome" placeholder="Nome completo">
    <input id="cpf" placeholder="CPF">
    <input id="telefone" placeholder="Telefone">

    <label>Foto / Selfie</label>
    <input id="foto" type="file" accept="image/*" capture="user">

    <label>Assinatura</label>
    <canvas id="assinatura" width="500" height="260"></canvas>

    <div class="botoes">
      <button class="btn-limpar" onclick="limparAssinatura()">Limpar assinatura</button>
      <button class="btn-enviar" onclick="enviar()">Confirmar e enviar</button>
    </div>

    <p id="status"></p>

    <div class="rodape">
      Seus dados serão usados apenas para confirmação do atendimento.
    </div>

  </div>

  <script>
    const canvas = document.getElementById("assinatura");
    const ctx = canvas.getContext("2d");
    let desenhando = false;

    function posicao(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches ? e.touches[0] : e;
      return {
        x: (touch.clientX - rect.left) * (canvas.width / rect.width),
        y: (touch.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function iniciar(e) {
      e.preventDefault();
      desenhando = true;
      const p = posicao(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }

    function parar(e) {
      e.preventDefault();
      desenhando = false;
    }

    function desenhar(e) {
      if (!desenhando) return;
      e.preventDefault();
      const p = posicao(e);
      ctx.lineWidth = 5;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#000";
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    canvas.addEventListener("mousedown", iniciar);
    canvas.addEventListener("mouseup", parar);
    canvas.addEventListener("mousemove", desenhar);
    canvas.addEventListener("mouseleave", parar);

    canvas.addEventListener("touchstart", iniciar, { passive: false });
    canvas.addEventListener("touchend", parar, { passive: false });
    canvas.addEventListener("touchmove", desenhar, { passive: false });

    function limparAssinatura() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function lerFoto() {
      return new Promise(resolve => {
        const file = document.getElementById("foto").files[0];
        if (!file) return resolve("");
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    async function enviar() {
      const status = document.getElementById("status");

      const nome = document.getElementById("nome").value.trim();
      const cpf = document.getElementById("cpf").value.trim();
      const telefone = document.getElementById("telefone").value.trim();

      if (!nome || !cpf || !telefone) {
        status.innerText = "Preencha nome, CPF e telefone.";
        return;
      }

      status.innerText = "Solicitando localização...";

      navigator.geolocation.getCurrentPosition(async function(pos) {
        const fotoBase64 = await lerFoto();
        const assinaturaBase64 = canvas.toDataURL("image/png");

        const dados = {
          nome: nome,
          cpf: cpf,
          telefone: telefone,
          latitude: pos.coords.latitude,
          longitude: pos.coords.longitude,
          precisao: pos.coords.accuracy,
          foto: fotoBase64,
          assinatura: assinaturaBase64
        };

        status.innerText = "Enviando dados...";

        google.script.run
          .withSuccessHandler(function() {
  document.body.innerHTML = `
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0b0b;color:white;text-align:center;font-family:Arial;padding:20px;">
    <div style="background:#111;border:1px solid #d4af37;border-radius:20px;padding:30px;max-width:500px;box-shadow:0 0 25px rgba(212,175,55,.3);">
      <h1 style="color:#d4af37;">✓ Confirmação recebida</h1>

      <p style="font-size:18px;line-height:1.6;">
        Rogerio Cavalcanti agradece pela sua colaboração.
      </p>

      <p style="color:#ccc;font-size:16px;line-height:1.6;">
        Seus dados foram recebidos com sucesso e estão em processo de confirmação.
      </p>

      <p style="color:#999;font-size:14px;">
        Você já pode fechar esta página.
      </p>
    </div>
  </div>
`;
})
          .withFailureHandler(function(erro) {
            status.innerText = "Erro: " + erro.message;
          })
          .salvarDados(dados);

      }, function() {
        status.innerText = "Localização não autorizada.";
      }, {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      });
    }
  </script>
</body>
</html>
