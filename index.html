<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#050505;
  color:#fff;
  min-height:100vh;
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  width:100%;
  max-width:430px;
}

.logo{
  width:180px;
  height:180px;
  object-fit:cover;
  display:block;
  margin:0 auto 10px;
  border-radius:50%;
}

.titulo{
  text-align:center;
  color:#d4af37;
  font-size:30px;
  font-weight:bold;
  margin-bottom:22px;
  letter-spacing:2px;
}

.card{
  border:1px solid #d4af37;
  border-radius:20px;
  padding:22px;
  background:#090909;
  box-shadow:0 0 25px rgba(212,175,55,.20);
}

label{
  display:block;
  color:#d4af37;
  font-weight:bold;
  margin-top:18px;
  font-size:18px;
}

input{
  width:100%;
  padding:16px;
  border-radius:10px;
  border:1px solid #555;
  background:#080808;
  color:#fff;
  font-size:17px;
  margin-top:8px;
}

input::placeholder{
  color:#aaa;
}

.file-area{
  border:1px solid #d4af37;
  border-radius:10px;
  padding:14px;
  margin-top:8px;
}

#preview{
  width:100%;
  margin-top:14px;
  border-radius:10px;
  display:none;
}

button.enviar{
  width:100%;
  padding:17px;
  margin-top:24px;
  background:#d4af37;
  color:#000;
  border:none;
  border-radius:10px;
  font-size:20px;
  font-weight:bold;
}

button:disabled{
  opacity:.6;
}

#contador{
  float:right;
  color:#aaa;
  font-size:15px;
}

#status{
  text-align:center;
  margin-top:16px;
  font-weight:bold;
  line-height:1.4;
}

.sucesso{
  display:none;
  text-align:center;
  border:1px solid #d4af37;
  border-radius:18px;
  padding:28px;
  background:#090909;
}

.sucesso h2{
  color:#d4af37;
}
</style>
</head>

<body>

<div class="container" id="formCard">

  <img src="leao.jpeg" class="logo">

  <div class="titulo">REGISTRO</div>

  <div class="card">
    <form id="formulario">

      <label>NOME</label>
      <input type="text" id="nome" placeholder="Digite seu nome completo" required>

      <label>PONTOS <span id="contador">0 / 11</span></label>
      <input
        type="text"
        id="pontos"
        placeholder="Digite 11 dígitos"
        maxlength="11"
        inputmode="numeric"
        required>

      <label>FOTO OBRIGATÓRIA</label>
      <div class="file-area">
        <input type="file" id="foto" accept="image/*" capture="environment" required>
      </div>

      <img id="preview">

      <button class="enviar" id="btnEnviar" type="submit">ENVIAR REGISTRO</button>

    </form>

    <div id="status"></div>
  </div>
</div>

<div class="container sucesso" id="sucesso">
  <h2>✅ REGISTRO ENVIADO</h2>
  <p>Obrigado pela colaboração.</p>
  <p>Seu registro foi recebido com sucesso.</p>
  <p>Esta página pode ser fechada.</p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKZKLybXTdjNRimFBil9Ob_n6xU-HrqtPQGUKwJA0i63oiAcx8j67aoffQstEfRMBaqg/exec";

const PRECISAO_IDEAL = 10;
const PRECISAO_ACEITAVEL = 20;
const TEMPO_MAXIMO_GPS = 30000;

if(localStorage.getItem("registroEnviadoRC") === "sim"){
  document.getElementById("formCard").style.display = "none";
  document.getElementById("sucesso").style.display = "block";
}

const pontosInput = document.getElementById("pontos");
const contador = document.getElementById("contador");

pontosInput.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g,"").slice(0,11);
  contador.innerText = this.value.length + " / 11";
});

document.getElementById("foto").addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = e => {
    const img = document.getElementById("preview");
    img.src = e.target.result;
    img.style.display = "block";
  };

  reader.readAsDataURL(file);
});

function obterGPS(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){
      reject("Este aparelho não suporta localização.");
      return;
    }

    let melhorPosicao = null;
    let finalizado = false;

    const watchId = navigator.geolocation.watchPosition(
      pos => {
        if(!melhorPosicao || pos.coords.accuracy < melhorPosicao.coords.accuracy){
          melhorPosicao = pos;
        }

        if(pos.coords.accuracy <= PRECISAO_IDEAL && !finalizado){
          finalizado = true;
          navigator.geolocation.clearWatch(watchId);
          resolve(pos);
        }
      },
      () => {
        if(!finalizado){
          finalizado = true;
          navigator.geolocation.clearWatch(watchId);
          reject("Não foi possível obter a localização. Ative o GPS e permita o acesso.");
        }
      },
      {
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:TEMPO_MAXIMO_GPS
      }
    );

    setTimeout(()=>{
      if(finalizado) return;

      finalizado = true;
      navigator.geolocation.clearWatch(watchId);

      if(melhorPosicao && melhorPosicao.coords.accuracy <= PRECISAO_ACEITAVEL){
        resolve(melhorPosicao);
      }else{
        reject("GPS impreciso. Vá para uma área aberta, ative o GPS e tente novamente.");
      }
    }, TEMPO_MAXIMO_GPS);
  });
}

async function obterEndereco(lat, lon){
  try{
    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&addressdetails=1`;
    const r = await fetch(url);
    const j = await r.json();
    const a = j.address || {};

    return {
      bairro: a.suburb || a.neighbourhood || a.city_district || a.quarter || "",
      rua: a.road || a.pedestrian || a.residential || a.street || "",
      numero: a.house_number || "",
      cidadeEstado: `${a.city || a.town || a.village || a.municipality || ""} - ${a.state || ""}`
    };

  }catch(e){
    return {
      bairro:"",
      rua:"",
      numero:"",
      cidadeEstado:""
    };
  }
}

function arquivoBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById("formulario").addEventListener("submit", async function(e){
  e.preventDefault();

  const btn = document.getElementById("btnEnviar");
  const status = document.getElementById("status");

  if(localStorage.getItem("registroEnviadoRC") === "sim"){
    status.innerHTML = "Registro já enviado.";
    return;
  }

  btn.disabled = true;

  try{
    const nome = document.getElementById("nome").value.trim();
    const pontos = document.getElementById("pontos").value.trim();
    const fotoFile = document.getElementById("foto").files[0];

    if(!nome) throw new Error("Informe o nome.");
    if(pontos.length !== 11) throw new Error("O campo PONTOS precisa ter exatamente 11 dígitos.");
    if(!fotoFile) throw new Error("A foto é obrigatória.");

    status.innerHTML = "Obtendo localização precisa...<br>Aguarde até 30 segundos.";

    const pos = await obterGPS();

    const latitude = pos.coords.latitude;
    const longitude = pos.coords.longitude;
    const precisao = Math.round(pos.coords.accuracy) + "m";

    status.innerHTML = "Buscando endereço...";

    const endereco = await obterEndereco(latitude, longitude);

    status.innerHTML = "Enviando registro...";

    const foto = await arquivoBase64(fotoFile);

    const dados = {
      nome,
      pontos,
      bairro: endereco.bairro,
      rua: endereco.rua,
      numero: endereco.numero,
      cidadeEstado: endereco.cidadeEstado,
      latitude,
      longitude,
      precisao,
      foto
    };

    await fetch(SCRIPT_URL, {
      method:"POST",
      headers:{
        "Content-Type":"text/plain;charset=utf-8"
      },
      body:JSON.stringify(dados)
    });

    localStorage.setItem("registroEnviadoRC","sim");

    document.getElementById("formCard").style.display = "none";
    document.getElementById("sucesso").style.display = "block";

    setTimeout(()=>{
      window.open("", "_self");
      window.close();

      document.body.innerHTML = `
        <div style="color:white;text-align:center;margin-top:80px;font-family:Arial">
          <h2>✅ REGISTRO ENVIADO</h2>
          <p>Você já pode fechar esta página.</p>
        </div>
      `;
    },2000);

  }catch(err){
    status.innerHTML = "Erro: " + err.message;
    btn.disabled = false;
  }
});
</script>

</body>
</html>
